}

.weather-row {

.weather-text {

  overflow: hidden;

* {

  margin: 0;
  padding: 0;

body {

.header {
  display: flex;

  align-items: center;

.title {
  font-size: 24px;
  font-weight: 700;

.header-right {

  gap: 2px;
}

.clock {
  font-size: 18px;
  font-weight: 700;

}

.updated {
  font-size: 13px;
  color: #9aa4af;
}

.main-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 10px;
  height: calc(100vh - 52px);
}

.panel {
  background: #11161d;
  border: 1px solid #222a33;
  border-radius: 14px;
  padding: 10px;
  overflow: hidden;
}

.left-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.right-panel {
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
  min-height: 0;
}

.panel-title {
  font-size: 18px;
  font-weight: 700;
  color: #58a6ff;
  margin-bottom: 8px;
}

.subsection {
  margin-bottom: 10px;
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
}

.row {
  display: grid;
  grid-template-columns: 70px 1fr 65px;
  gap: 8px;
  align-items: center;
  background: #1a212b;
  border-radius: 8px;
  padding: 7px 9px;
  margin-bottom: 5px;
}

.route {
  font-size: 16px;
  font-weight: 700;
}

.direction {
  font-size: 13px;
  color: #c7d1db;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.minutes {
  font-size: 14px;
  font-weight: 700;
  text-align: right;
}

.red { color: #ff5c5c; }
.yellow { color: #ffb347; }
.green { color: #5cd65c; }
.gray { color: #9aa4af; }

.placeholder {
  font-size: 13px;
  color: #9aa4af;
}

.error {
  color: #ff6b6b;
}

/* WEATHER */
.weather-current {
  background: #1a212b;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
}

.weather-location {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}

.weather-temp {
  font-size: 24px;
  font-weight: 700;
  color: #58a6ff;
  margin-bottom: 2px;
}

.weather-desc {
  font-size: 12px;
  color: #c7d1db;
}

.weather-block-title {
  font-size: 14px;
  font-weight: 700;
  margin: 6px 0 4px;
}

.weather-row {
  display: grid;
  grid-template-columns: 55px 1fr 42px;
  gap: 6px;
  background: #1a212b;
  border-radius: 8px;
  padding: 6px 8px;
  margin-bottom: 4px;
}

.weather-time,
.weather-date {
  font-size: 11px;
  font-weight: 700;
}

.weather-text {
  font-size: 11px;
  color: #c7d1db;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.weather-value {
  font-size: 12px;
  font-weight: 700;
  text-align: right;
  color: #58a6ff;
}

/* BIKE */
#bike-content {
  height: 100%;
}

.bike-map-wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}

#bike-map {
  width: 100%;
  flex: 1;
  min-height: 180px;
  border-radius: 10px;
  border: 1px solid #222a33;
}

.bike-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  align-items: center;
  padding-top: 6px;
  font-size: 11px;
  color: #c7d1db;
}

.bike-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.bike-legend-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  padding-top: 4px;
  font-size: 11px;
  color: #ffffff;
  font-weight: 700;
}

.bike-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  display: inline-block;
}

.bike-dot-green {
  background: #34c759;
}

.bike-dot-white-green {
  background: #ffffff;
  border: 2px solid #34c759;
}

.bike-dot-red {
  background: #ff3b30;
}

.bike-dot-gray {
  background: #8e8e93;
}
</style>
</head>
<body>
  <div class="header">
 <div class="title">JARVIS HOME TRANSIT DASHBOARD</div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="updated" id="updated">Updated: --</div>
  </div>
</div>

  <div class="main-grid">
    <div class="panel left-panel">
      <div class="panel-title">WMATA</div>

      <div class="subsection">
        <div class="section-title">BUS</div>
        <div id="bus-content"></div>
      </div>

      <div class="subsection">
        <div class="section-title">METRO</div>
        <div id="metro-content"></div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel">
        <div class="panel-title">BIKE</div>
        <div id="bike-content"></div>
      </div>

      <div class="panel">
        <div class="panel-title">WEATHER</div>
        <div id="weather-content"></div>
      </div>
    </div>
  </div>

  <script>
    const HOME_LAT = 38.895643;
    const HOME_LON = -76.980581;
    const HOME_ZOOM = 16;

    function minuteClass(value) {
      if (value === "ARR" || value === "BRD") return "red";
      const n = parseInt(String(value).replace(" min", ""));
      if (isNaN(n)) return "gray";
      if (n <= 4) return "red";
      if (n <= 10) return "yellow";
      return "green";
    }

    function formatBusMinutes(value) {
      const n = Number(value);
      if (!isNaN(n)) return n <= 0 ? "ARR" : `${n} min`;
      return String(value || "?");
    }

    function formatMetroMinutes(value) {
      const text = String(value || "?").trim();
      if (text === "ARR" || text === "BRD") return text;
      const n = Number(text);
      if (!isNaN(n)) return n <= 0 ? "ARR" : `${n} min`;
      return text;
    }

    function formatHour(dtText) {
      const date = new Date(dtText.replace(" ", "T"));
      return date.toLocaleTimeString([], { hour: "numeric", hour12: true });
    }

    function formatDate(dateText) {
      const date = new Date(dateText + "T00:00:00");
      return date.toLocaleDateString([], {
        weekday: "short",
        month: "numeric",
        day: "numeric"
      });
    }

    function createRow(left, middle, right, rightClass = "") {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="route">${left}</div>
        <div class="direction">${middle}</div>
        <div class="minutes ${rightClass}">${right}</div>
      `;
      return row;
    }

    async function loadWmata() {
      try {
        const response = await fetch("wmata_data.json?_=" + Date.now());
        const data = await response.json();

        document.getElementById("updated").textContent = `Updated: ${data.updated}`;

        const busContent = document.getElementById("bus-content");
        busContent.innerHTML = "";

        data.bus.forEach(stop => {
          const section = document.createElement("div");
          section.className = "subsection";

          const title = document.createElement("div");
          title.className = "section-title";
          title.textContent = stop.name;
          section.appendChild(title);

          if (stop.error) {
            const err = document.createElement("div");
            err.className = "placeholder error";
            err.textContent = "Error: " + stop.error;
            section.appendChild(err);
          } else if (!stop.items || stop.items.length === 0) {
            const empty = document.createElement("div");
            empty.className = "placeholder";
            empty.textContent = "No buses arriving soon";
            section.appendChild(empty);
          } else {
            stop.items.forEach(bus => {
              const minutes = formatBusMinutes(bus.Minutes);
              section.appendChild(
                createRow(
                  bus.RouteID || "?",
                  bus.DirectionText || "?",
                  minutes,
                  minuteClass(minutes)
                )
              );
            });
          }

          busContent.appendChild(section);
        });

        const metroContent = document.getElementById("metro-content");
        metroContent.innerHTML = "";

        data.metro.forEach(station => {
          const section = document.createElement("div");
          section.className = "subsection";

          const title = document.createElement("div");
          title.className = "section-title";
          title.textContent = station.name;
          section.appendChild(title);

          if (station.error) {
            const err = document.createElement("div");
            err.className = "placeholder error";
            err.textContent = "Error: " + station.error;
            section.appendChild(err);
          } else if (!station.items || station.items.length === 0) {
            const empty = document.createElement("div");
            empty.className = "placeholder";
            empty.textContent = "No trains arriving soon";
            section.appendChild(empty);
          } else {
            station.items.forEach(train => {
              const minutes = formatMetroMinutes(train.Min);
              section.appendChild(
                createRow(
                  train.Line || "?",
                  train.DestinationName || "?",
                  minutes,
                  minuteClass(minutes)
                )
              );
            });
          }

          metroContent.appendChild(section);
        });
      } catch (error) {
        document.getElementById("bus-content").innerHTML =
          `<div class="placeholder error">Failed to load WMATA data</div>`;
        document.getElementById("metro-content").innerHTML =
          `<div class="placeholder error">Failed to load WMATA data</div>`;
      }
    }

    async function loadWeather() {
  try {
    const response = await fetch("weather_data.json?_=" + Date.now());
    const data = await response.json();

    const weatherContent = document.getElementById("weather-content");
    weatherContent.innerHTML = "";

    if (data.error) {
      weatherContent.innerHTML =
        `<div class="placeholder error">Weather error: ${JSON.stringify(data.error)}</div>`;
      return;
    }

    const current = document.createElement("div");
    current.className = "weather-current";
    current.innerHTML = `
      <div class="weather-location">${data.location || "Weather"}</div>
      <div class="weather-temp">${data.current.temp}°F</div>
      <div class="weather-desc">${data.current.desc}</div>
    `;
    weatherContent.appendChild(current);

    const hourlyTitle = document.createElement("div");
    hourlyTitle.className = "weather-block-title";
    hourlyTitle.textContent = "6-Hour Forecast";
    weatherContent.appendChild(hourlyTitle);

    (data.hourly || []).slice(0, 6).forEach(item => {
      const row = document.createElement("div");
      row.className = "weather-row";
      row.innerHTML = `
        <div class="weather-time">${formatHour(item.time)}</div>
        <div class="weather-text">${item.desc} • Rain ${item.pop ?? 0}%</div>
        <div class="weather-value">${item.temp}°</div>
      `;
      weatherContent.appendChild(row);
    });

  } catch (error) {
    document.getElementById("weather-content").innerHTML =
      `<div class="placeholder error">Failed to load weather data</div>`;
  }
}
async function loadBike() {
  try {
    const response = await fetch("bike_data.json?_=" + Date.now());
    const data = await response.json();

    const bikeContent = document.getElementById("bike-content");
    bikeContent.innerHTML = "";

    if (
      (data.lime && data.lime.error) ||
      (data.cabi && data.cabi.error) ||
      (data.cabi_free_ebikes && data.cabi_free_ebikes.error)
    ) {
      bikeContent.innerHTML =
        `<div class="placeholder error">Failed to load bike map</div>`;
      return;
    }

    const mapWrapper = document.createElement("div");
    mapWrapper.className = "bike-map-wrapper";

    const mapDiv = document.createElement("div");
    mapDiv.id = "bike-map";
    mapWrapper.appendChild(mapDiv);

    const legend = document.createElement("div");
    legend.className = "bike-legend";
    legend.innerHTML = `
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-green"></span>
        <span>Lime scooter</span>
      </div>
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-white-green"></span>
        <span>Lime e-bike</span>
      </div>
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-red"></span>
        <span>CaBi dock</span>
      </div>
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-gray-red"></span>
        <span>CaBi free e-bike</span>
      </div>
    `;
    mapWrapper.appendChild(legend);

    const legendStats = document.createElement("div");
    legendStats.className = "bike-legend-stats";
    legendStats.innerHTML = (data.cabi?.markers || [])
      .map(m => `${m.name}: ${m.bikes ?? 0} bike, ${m.ebikes ?? 0} e-bike`)
      .join(" • ");
    mapWrapper.appendChild(legendStats);

    bikeContent.appendChild(mapWrapper);

    const map = L.map("bike-map", {
      zoomControl: true
    }).setView([HOME_LAT, HOME_LON], HOME_ZOOM);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    L.polygon([
      [HOME_LAT + 0.00010, HOME_LON],
      [HOME_LAT - 0.00007, HOME_LON - 0.00008],
      [HOME_LAT - 0.00007, HOME_LON + 0.00008]
    ], {
      color: "#ff9f0a",
      fillColor: "#ff9f0a",
      fillOpacity: 1,
      weight: 1.5
    })
      .bindPopup("Home")
      .addTo(map);

    L.circle([HOME_LAT, HOME_LON], {
      radius: 241.4,
      color: "#58a6ff",
      fillColor: "#58a6ff",
      fillOpacity: 0.05,
      weight: 1
    }).addTo(map);

    (data.lime?.markers || []).forEach(m => {
      const isScooter = m.type === "scooter";

      L.circleMarker([m.lat, m.lon], {
        radius: 2.5,
        color: "#34c759",
        fillColor: isScooter ? "#34c759" : "#ffffff",
        fillOpacity: 1,
        weight: 1.5
      })
        .bindPopup(`Lime ${m.type}<br>${m.distance_miles ?? "?"} mi away`)
        .addTo(map);
    });

    (data.cabi?.markers || []).forEach(m => {
      L.circleMarker([m.lat, m.lon], {
        radius: 3.5,
        color: "#ff3b30",
        fillColor: "#ff3b30",
        fillOpacity: 1,
        weight: 1.5
      })
        .bindPopup(`
          <strong>${m.name}</strong><br>
          Dock bikes: ${m.bikes ?? 0}<br>
          Dock e-bikes: ${m.ebikes ?? 0}<br>
          Open docks: ${m.docks ?? 0}<br>
          Distance: ${m.distance_miles ?? "?"} mi
        `)
        .addTo(map);
    });

    (data.cabi_free_ebikes?.markers || []).forEach(m => {
      L.circleMarker([m.lat, m.lon], {
        radius: 2.5,
        color: "#ff3b30",
        fillColor: "#8e8e93",
        fillOpacity: 1,
        weight: 1.5
      })
        .bindPopup(`CaBi free e-bike<br>${m.distance_miles ?? "?"} mi away`)
        .addTo(map);
    });

  } catch (error) {
    document.getElementById("bike-content").innerHTML =
      `<div class="placeholder error">Failed to load bike map</div>`;
  }
}
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString([], {
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });
  document.getElementById("clock").textContent = time;
}
    async function loadAll() {
      await loadWmata();
      await loadBike();
      await loadWeather();
    }

   loadAll();
updateClock();
setInterval(updateClock, 1000);
  </script>
</body>

      <div class="panel-title">WMATA</div>

      <div class="subsection">
        <div class="section-title">BUS</div>
        <div id="bus-content"></div>
      </div>

      <div class="subsection">
        <div class="section-title">METRO</div>
        <div id="metro-content"></div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel">
        <div class="panel-title">BIKE TEST 123</div>
        <div id="bike-content"></div>
      </div>

      <div class="panel">
        <div class="panel-title">WEATHER</div>
        <div id="weather-content"></div>
      </div>
    </div>
  </div>

  <script>
    const HOME_LAT = 38.895643;
    const HOME_LON = -76.980581;
    const HOME_ZOOM = 16;

    function minuteClass(value) {
      if (value === "ARR" || value === "BRD") return "red";
      const n = parseInt(String(value).replace(" min", ""));
      if (isNaN(n)) return "gray";
      if (n <= 4) return "red";
      if (n <= 10) return "yellow";
      return "green";
    }

    function formatBusMinutes(value) {
      const n = Number(value);
      if (!isNaN(n)) return n <= 0 ? "ARR" : `${n} min`;
      return String(value || "?");
    }

    function formatMetroMinutes(value) {
      const text = String(value || "?").trim();
      if (text === "ARR" || text === "BRD") return text;
      const n = Number(text);
      if (!isNaN(n)) return n <= 0 ? "ARR" : `${n} min`;
      return text;
    }

    function formatHour(dtText) {
      const date = new Date(dtText.replace(" ", "T"));
      return date.toLocaleTimeString([], { hour: "numeric", hour12: true });
    }

    function formatDate(dateText) {
      const date = new Date(dateText + "T00:00:00");
      return date.toLocaleDateString([], {
        weekday: "short",
        month: "numeric",
        day: "numeric"
      });
    }

    function createRow(left, middle, right, rightClass = "") {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="route">${left}</div>
        <div class="direction">${middle}</div>
        <div class="minutes ${rightClass}">${right}</div>
      `;
      return row;
    }

    async function loadWmata() {
      try {
        const response = await fetch("wmata_data.json?_=" + Date.now());
        const data = await response.json();

        document.getElementById("updated").textContent = `Updated: ${data.updated}`;

        const busContent = document.getElementById("bus-content");
        busContent.innerHTML = "";

        data.bus.forEach(stop => {
          const section = document.createElement("div");
          section.className = "subsection";

          const title = document.createElement("div");
          title.className = "section-title";
          title.textContent = stop.name;
          section.appendChild(title);

          if (stop.error) {
            const err = document.createElement("div");
            err.className = "placeholder error";
            err.textContent = "Error: " + stop.error;
            section.appendChild(err);
          } else if (!stop.items || stop.items.length === 0) {
            const empty = document.createElement("div");
            empty.className = "placeholder";
            empty.textContent = "No buses arriving soon";
            section.appendChild(empty);
          } else {
            stop.items.forEach(bus => {
              const minutes = formatBusMinutes(bus.Minutes);
              section.appendChild(
                createRow(
                  bus.RouteID || "?",
                  bus.DirectionText || "?",
                  minutes,
                  minuteClass(minutes)
                )
              );
            });
          }

          busContent.appendChild(section);
        });

        const metroContent = document.getElementById("metro-content");
        metroContent.innerHTML = "";

        data.metro.forEach(station => {
          const section = document.createElement("div");
          section.className = "subsection";

          const title = document.createElement("div");
          title.className = "section-title";
          title.textContent = station.name;
          section.appendChild(title);

          if (station.error) {
            const err = document.createElement("div");
            err.className = "placeholder error";
            err.textContent = "Error: " + station.error;
            section.appendChild(err);
          } else if (!station.items || station.items.length === 0) {
            const empty = document.createElement("div");
            empty.className = "placeholder";
            empty.textContent = "No trains arriving soon";
            section.appendChild(empty);
          } else {
            station.items.forEach(train => {
              const minutes = formatMetroMinutes(train.Min);
              section.appendChild(
                createRow(
                  train.Line || "?",
                  train.DestinationName || "?",
                  minutes,
                  minuteClass(minutes)
                )
              );
            });
          }

          metroContent.appendChild(section);
        });
      } catch (error) {
        document.getElementById("bus-content").innerHTML =
          `<div class="placeholder error">Failed to load WMATA data</div>`;
        document.getElementById("metro-content").innerHTML =
          `<div class="placeholder error">Failed to load WMATA data</div>`;
      }
    }

    async function loadWeather() {
      try {
        const response = await fetch("weather_data.json?_=" + Date.now());
        const data = await response.json();

        const weatherContent = document.getElementById("weather-content");
        weatherContent.innerHTML = "";

        if (data.error) {
          weatherContent.innerHTML =
            `<div class="placeholder error">Weather error: ${JSON.stringify(data.error)}</div>`;
          return;
        }

        const current = document.createElement("div");
        current.className = "weather-current";
        current.innerHTML = `
          <div class="weather-location">${data.location || "Weather"}</div>
          <div class="weather-temp">${data.current.temp}°F</div>
          <div class="weather-desc">${data.current.desc}</div>
        `;
        weatherContent.appendChild(current);

        const hourlyTitle = document.createElement("div");
        hourlyTitle.className = "weather-block-title";
        hourlyTitle.textContent = "Hourly";
        weatherContent.appendChild(hourlyTitle);

        (data.hourly || []).slice(0, 4).forEach(item => {
          const row = document.createElement("div");
          row.className = "weather-row";
          row.innerHTML = `
            <div class="weather-time">${formatHour(item.time)}</div>
            <div class="weather-text">${item.desc}</div>
            <div class="weather-value">${item.temp}°</div>
          `;
          weatherContent.appendChild(row);
        });

        const dailyTitle = document.createElement("div");
        dailyTitle.className = "weather-block-title";
        dailyTitle.textContent = "3-Day";
        weatherContent.appendChild(dailyTitle);

        (data.daily || []).slice(0, 3).forEach(item => {
          const row = document.createElement("div");
          row.className = "weather-row";
          row.innerHTML = `
            <div class="weather-date">${formatDate(item.date)}</div>
            <div class="weather-text">${item.desc}</div>
            <div class="weather-value">${item.temp}°</div>
          `;
          weatherContent.appendChild(row);
        });
      } catch (error) {
        document.getElementById("weather-content").innerHTML =
          `<div class="placeholder error">Failed to load weather data</div>`;
      }
    }

    async function loadBike() {
  try {
    const response = await fetch("bike_data.json?_=" + Date.now());
    const data = await response.json();

    const bikeContent = document.getElementById("bike-content");
    bikeContent.innerHTML = "";

    if (
      (data.lime && data.lime.error) ||
      (data.cabi && data.cabi.error) ||
      (data.cabi_free_ebikes && data.cabi_free_ebikes.error)
    ) {
      bikeContent.innerHTML =
        `<div class="placeholder error">Failed to load bike map</div>`;
      return;
    }

    const mapWrapper = document.createElement("div");
    mapWrapper.style.display = "flex";
    mapWrapper.style.flexDirection = "column";
    mapWrapper.style.height = "100%";

    const mapDiv = document.createElement("div");
    mapDiv.id = "bike-map";
    mapWrapper.appendChild(mapDiv);

    const legend = document.createElement("div");
    legend.className = "bike-legend";
    legend.innerHTML = `
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-green"></span>
        <span>Lime scooter</span>
      </div>
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-white"></span>
        <span>Lime e-bike</span>
      </div>
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-red"></span>
        <span>CaBi dock station</span>
      </div>
      <div class="bike-legend-item">
        <span class="bike-dot bike-dot-gray"></span>
        <span>CaBi free e-bike</span>
      </div>
    `;
    mapWrapper.appendChild(legend);

    bikeContent.appendChild(mapWrapper);

    const map = L.map("bike-map").setView([HOME_LAT, HOME_LON], HOME_ZOOM);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    // home marker = blue square
    L.rectangle(
      [
        [HOME_LAT - 0.00018, HOME_LON - 0.00018],
        [HOME_LAT + 0.00018, HOME_LON + 0.00018]
      ],
      {
        color: "#58a6ff",
        fillColor: "#58a6ff",
        fillOpacity: 1,
        weight: 2
      }
    )
      .bindPopup("Home")
      .addTo(map);

    // visual radius circle
    L.circle([HOME_LAT, HOME_LON], {
      radius: 241.4,
      color: "#58a6ff",
      fillColor: "#58a6ff",
      fillOpacity: 0.06,
      weight: 1
    }).addTo(map);

    // lime markers: smaller
    (data.lime?.markers || []).forEach(m => {
      const isScooter = m.type === "scooter";
      const fill = isScooter ? "#34c759" : "#ffffff";
      const stroke = isScooter ? "#34c759" : "#666666";

      L.circleMarker([m.lat, m.lon], {
        radius: 3,
        color: stroke,
        fillColor: fill,
        fillOpacity: 0.95,
        weight: 1.5
      })
        .bindPopup(`Lime ${m.type}<br>${m.distance_miles ?? "?"} mi away`)
        .addTo(map);
    });

    // cabi dock stations: smaller red dots
    (data.cabi?.markers || []).forEach(m => {
      const dockBikes = m.bikes ?? 0;
      const dockEbikes = m.ebikes ?? 0;

      L.circleMarker([m.lat, m.lon], {
        radius: 4,
        color: "#ff3b30",
        fillColor: "#ff3b30",
        fillOpacity: 0.95,
        weight: 1.5
      })
        .bindPopup(`
          <strong>${m.name}</strong><br>
          Dock bikes: ${dockBikes}<br>
          Dock e-bikes: ${dockEbikes}<br>
          Open docks: ${m.docks ?? 0}<br>
          Distance: ${m.distance_miles ?? "?"} mi
        `)
        .addTo(map);
    });

    // cabi free ebikes: smaller gray dots
    (data.cabi_free_ebikes?.markers || []).forEach(m => {
      L.circleMarker([m.lat, m.lon], {
        radius: 3,
        color: "#8e8e93",
        fillColor: "#8e8e93",
        fillOpacity: 0.95,
        weight: 1.5
      })
        .bindPopup(`CaBi free e-bike<br>${m.distance_miles ?? "?"} mi away`)
        .addTo(map);
    });

  } catch (error) {
    document.getElementById("bike-content").innerHTML =
      `<div class="placeholder error">Failed to load bike map</div>`;
  }
}

    async function loadAll() {
      await loadWmata();
      await loadBike();
      await loadWeather();
    }

    loadAll();
  </script>
</body>
</html>
